name: Deploy Webhook Server to Railway

on:
  push:
    branches: [main]
    paths:
      - "zero_touch_saas/**"
      - ".github/workflows/deploy.yml"

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy
        run: railway up --service webhook-server
        working-directory: ./zero_touch_saas
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

---
# Para el Growth Bot (corre cada hora)
# Guardar como: .github/workflows/growth_bot.yml

name: Run Growth Bot

on:
  schedule:
    - cron: "0 * * * *"   # Cada hora en punto
  workflow_dispatch:        # Permite ejecución manual

jobs:
  run-bot:
    name: Reddit Growth Bot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r zero_touch_saas/requirements.txt

      - name: Run Growth Bot
        working-directory: ./zero_touch_saas
        run: python growth_bot.py --run-once
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD: ${{ secrets.REDDIT_PASSWORD }}
          REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
          STRIPE_PRICE_BASIC_URL: ${{ secrets.STRIPE_PRICE_BASIC_URL }}
          STRIPE_PRICE_PRO_URL: ${{ secrets.STRIPE_PRICE_PRO_URL }}
          STRIPE_PRICE_PACK_URL: ${{ secrets.STRIPE_PRICE_PACK_URL }}
